<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>重力2048テトリス</title>
<style>
body{
    margin:0;
    background:#0f0f14;
    color:white;
    font-family:sans-serif;
    text-align:center;
}
h1{margin:10px;}
#info{margin:5px;font-size:14px;}
#board{
    margin:10px auto;
    display:grid;
    grid-template-columns: repeat(6, 60px);
    grid-template-rows: repeat(12, 60px);
    gap:4px;
}
.cell{
    width:60px;
    height:60px;
    background:#1e1e26;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    font-size:18px;
    border-radius:10px;
    transition:0.15s;
}
.pop{ animation:pop 0.2s ease; }
@keyframes pop{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}
.clearFlash{
    animation:flash 0.3s ease;
}
@keyframes flash{
    0%{background:white;}
    100%{background:#1e1e26;}
}
</style>
</head>
<body>

<h1>🧩 重力テトリス2048</h1>
<div id="info"></div>
<div id="board"></div>

<script>
const COLS=6;
const ROWS=12;
let board=[];
let current=null;
let interval;
let score=0;
let combo=0;
let highScore=localStorage.getItem("gravityHigh")||0;

function init(){
    board=Array(ROWS).fill().map(()=>Array(COLS).fill(0));
    score=0;
    spawn();
    update();
    interval=setInterval(drop,600);
}

function spawn(){
    const col=Math.floor(Math.random()*COLS);
    const special=Math.random()<0.1;
    current={
        row:0,
        col:col,
        value:special?"B":(Math.random()<0.7?2:4)
    };
    if(board[0][col]!==0){
        endGame();
    }
}

function drop(){
    if(!current)return;
    if(current.row+1<ROWS && board[current.row+1][current.col]===0){
        current.row++;
    }else{
        place();
    }
    update();
}

function place(){
    if(current.value==="B"){
        explode(current.row,current.col);
    }else{
        board[current.row][current.col]=current.value;
        processBoard();
    }
    spawn();
}

function explode(r,c){
    for(let y=-1;y<=1;y++){
        for(let x=-1;x<=1;x++){
            let nr=r+y,nc=c+x;
            if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS){
                board[nr][nc]=0;
            }
        }
    }
    score+=200;
}

function processBoard(){
    let merged=true;
    combo=0;
    while(merged){
        merged=false;
        for(let r=0;r<ROWS;r++){
            for(let c=0;c<COLS;c++){
                if(board[r][c]!==0){
                    const dirs=[[1,0],[0,1]];
                    for(let d of dirs){
                        let nr=r+d[0],nc=c+d[1];
                        if(nr<ROWS&&nc<COLS){
                            if(board[nr][nc]===board[r][c]){
                                board[r][c]*=2;
                                board[nr][nc]=0;
                                score+=board[r][c];
                                combo++;
                                merged=true;
                            }
                        }
                    }
                }
            }
        }
        applyGravity();
    }
    if(combo>0) score+=combo*100;

    clearLines();
}

function clearLines(){
    for(let r=0;r<ROWS;r++){
        if(board[r].every(v=>v!==0)){
            board[r].fill(0);
            score+=500;
        }
    }
    applyGravity();
}

function applyGravity(){
    let moved=true;
    while(moved){
        moved=false;
        for(let c=0;c<COLS;c++){
            for(let r=ROWS-1;r>0;r--){
                if(board[r][c]===0 && board[r-1][c]!==0){
                    board[r][c]=board[r-1][c];
                    board[r-1][c]=0;
                    moved=true;
                }
            }
        }
    }
}

function update(){
    const b=document.getElementById("board");
    b.innerHTML="";
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            const cell=document.createElement("div");
            cell.className="cell";
            let val=board[r][c];
            if(current && r===current.row && c===current.col){
                val=current.value;
            }
            if(val!==0){
                if(val==="B"){
                    cell.textContent="💣";
                    cell.style.background="#aa3333";
                }else{
                    cell.textContent=val;
                    cell.style.background=`hsl(${Math.log2(val)*35},70%,50%)`;
                }
            }
            b.appendChild(cell);
        }
    }
    document.getElementById("info").textContent=
        `Score:${score} | Combo:${combo} | HighScore:${highScore}`;
}

function endGame(){
    clearInterval(interval);
    if(score>highScore){
        localStorage.setItem("gravityHigh",score);
    }
    alert("ゲームオーバー\nScore:"+score);
    location.reload();
}

document.addEventListener("keydown",e=>{
    if(!current)return;
    if(e.key==="ArrowLeft"&&current.col>0&&board[current.row][current.col-1]===0){
        current.col--;
    }
    if(e.key==="ArrowRight"&&current.col<COLS-1&&board[current.row][current.col+1]===0){
        current.col++;
    }
    if(e.key==="ArrowDown"){
        drop();
    }
    update();
});

init();
</script>

</body>
</html>
