<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Platform Game</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87ceeb;
}

#game{
position:relative;
width:4000px;
height:700px;
}

.player{
width:30px;
height:30px;
background:blue;
position:absolute;
z-index:10;
}

.platform{
position:absolute;
height:20px;
background:#444;
}

.enemy{
width:30px;
height:30px;
background:red;
position:absolute;
}

.pit{
position:absolute;
background:black;
height:200px;
width:120px;
}

.spring{
width:40px;
height:20px;
background:pink;
position:absolute;
}

.checkpoint{
width:40px;
height:60px;
background:cyan;
position:absolute;
}

.door{
width:50px;
height:80px;
background:brown;
position:absolute;
border:5px solid black;
}

.bigwall{
position:absolute;
width:120px;
height:200px;
background:#555;
}

.switch{
width:40px;
height:20px;
background:orange;
position:absolute;
}

.hiddenPlatform{
position:absolute;
height:20px;
width:160px;
background:green;
display:none;
}

</style>
</head>

<body>

<div id="game">
<div id="player" class="player"></div>
</div>

<script>

const player=document.getElementById("player")
const game=document.getElementById("game")

let x=100
let y=300
let vx=0
let vy=0

let gravity=0.7
let jump=-12
let speed=4
let onGround=false

let checkpoint={x:100,y:300}

let keys={}

document.addEventListener("keydown",e=>{
keys[e.key]=true
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

function create(type,x,y,width=100){

let el=document.createElement("div")
el.className=type

el.style.left=x+"px"
el.style.top=y+"px"

if(type==="platform" || type==="hiddenPlatform"){
el.style.width=width+"px"
}

game.appendChild(el)

return el
}

function stage(){

create("platform",0,650,4000)

create("platform",300,550,150)
create("platform",600,480,150)
create("platform",900,420,150)

create("enemy",900,390)

create("spring",1200,630)

create("platform",1400,520,200)

create("pit",1700,650)

create("platform",1900,520,200)

create("enemy",1950,490)

create("checkpoint",2100,590)

create("bigwall",2300,450)

create("switch",2600,630)
create("hiddenPlatform",2700,500,200)

create("platform",3000,420,200)

create("enemy",3050,390)

create("door",3600,570)

}

stage()

function collide(a,b){

let ar=a.getBoundingClientRect()
let br=b.getBoundingClientRect()

return !(
ar.right<br.left ||
ar.left>br.right ||
ar.bottom<br.top ||
ar.top>br.bottom
)

}

function reset(){

x=checkpoint.x
y=checkpoint.y
vx=0
vy=0

document.querySelectorAll(".enemy").forEach(e=>{
e.style.left=parseInt(e.style.left)+"px"
})

}

function loop(){

if(keys["ArrowRight"]) vx=speed
else if(keys["ArrowLeft"]) vx=-speed
else vx=0

if(keys[" "] && onGround){

vy=jump
onGround=false

}

vy+=gravity

x+=vx
y+=vy

onGround=false

player.style.left=x+"px"
player.style.top=y+"px"

document.querySelectorAll(".platform,.hiddenPlatform").forEach(p=>{

if(collide(player,p)){

let top=p.offsetTop

if(y+30>top && y+30<top+20 && vy>=0){

y=top-30
vy=0
onGround=true

}

}

})

document.querySelectorAll(".spring").forEach(s=>{

if(collide(player,s)){
vy=-18
}

})

document.querySelectorAll(".enemy").forEach(e=>{

let ex=parseInt(e.style.left)

ex+=Math.random()<0.5?1:-1

e.style.left=ex+"px"

if(collide(player,e)){
reset()
}

})

document.querySelectorAll(".pit").forEach(p=>{

if(collide(player,p)){
reset()
}

})

document.querySelectorAll(".checkpoint").forEach(c=>{

if(collide(player,c)){

checkpoint.x=c.offsetLeft
checkpoint.y=c.offsetTop-40

c.style.background="yellow"

}

})

document.querySelectorAll(".switch").forEach(sw=>{

if(collide(player,sw)){

document.querySelectorAll(".hiddenPlatform").forEach(p=>{
p.style.display="block"
})

sw.style.background="red"

}

})

document.querySelectorAll(".door").forEach(d=>{

if(collide(player,d)){

alert("ステージクリア！")

}

})

if(y>700) reset()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
