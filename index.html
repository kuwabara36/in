<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ハードアクションゲーム</title>
<style>
body{margin:0;overflow:hidden;background:#87ceeb;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 450;

let gravity = 0.8;
let cameraX = 0;

let lives = 3;
let coins = 0;

const keys = {};

let player={
x:100,y:300,w:40,h:50,dx:0,dy:0,speed:5,jump:-15,onGround:false
};

const platforms=[
{x:0,y:400,w:2000,h:50},
{x:300,y:320,w:120,h:20},
{x:500,y:260,w:120,h:20},
{x:700,y:200,w:120,h:20,type:"fall"},
{x:950,y:300,w:120,h:20,type:"move",dir:1},
{x:1200,y:260,w:120,h:20},
{x:1400,y:220,w:120,h:20}
];

const spikes=[
{x:600,y:380,w:40,h:20},
{x:850,y:380,w:40,h:20}
];

const enemies=[
{x:750,y:160,w:40,h:40,dir:1},
{x:1300,y:220,w:40,h:40,dir:1}
];

const coinsList=[
{x:320,y:280},
{x:520,y:220},
{x:960,y:260},
{x:1420,y:180}
];

const goal={x:1800,y:350,w:50,h:50};

function collision(a,b){
return a.x<a.x+b.w&&
a.x+a.w>b.x&&
a.y<b.y+b.h&&
a.y+a.h>b.y;
}

function resetPlayer(){
player.x=100;
player.y=300;
player.dx=0;
player.dy=0;
}

function update(){

player.dx=0;

if(keys["ArrowRight"]) player.dx=player.speed;
if(keys["ArrowLeft"]) player.dx=-player.speed;

player.x+=player.dx;

player.dy+=gravity;
player.y+=player.dy;

player.onGround=false;

for(let p of platforms){

if(p.type==="move"){
p.x+=2*p.dir;
if(p.x>1100||p.x<900)p.dir*=-1;
}

if(player.x<p.x+p.w&&
player.x+player.w>p.x&&
player.y+player.h>p.y&&
player.y+player.h<p.y+20&&
player.dy>=0){

player.y=p.y-player.h;
player.dy=0;
player.onGround=true;

if(p.type==="fall"){
setTimeout(()=>{p.y+=500},500);
}
}
}

if(player.onGround && keys["Space"]){
player.dy=player.jump;
}

for(let s of spikes){
if(player.x<s.x+s.w&&
player.x+player.w>s.x&&
player.y+player.h>s.y){
die();
}
}

for(let e of enemies){

e.x+=2*e.dir;
if(e.x<700||e.x>1500)e.dir*=-1;

if(player.x<e.x+e.w&&
player.x+player.w>e.x&&
player.y<e.y+e.h&&
player.y+player.h>e.y){

if(player.dy>0){
e.dead=true;
player.dy=-10;
coins+=5;
}else{
die();
}
}
}

for(let c of coinsList){
if(!c.collected &&
player.x<c.x+20 &&
player.x+player.w>c.x &&
player.y<c.y+20 &&
player.y+player.h>c.y){
c.collected=true;
coins++;
}
}

if(player.x<goal.x+goal.w &&
player.x+player.w>goal.x &&
player.y<goal.y+goal.h &&
player.y+player.h>goal.y){
alert("クリア！コイン:"+coins);
location.reload();
}

if(player.y>canvas.height) die();

cameraX=player.x-200;
}

function die(){
lives--;
if(lives<=0){
alert("ゲームオーバー");
location.reload();
}
resetPlayer();
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.translate(-cameraX,0);

ctx.fillStyle="#654321";
for(let p of platforms){
ctx.fillRect(p.x,p.y,p.w,p.h);
}

ctx.fillStyle="silver";
for(let s of spikes){
ctx.fillRect(s.x,s.y,s.w,s.h);
}

ctx.fillStyle="gold";
for(let c of coinsList){
if(!c.collected)
ctx.fillRect(c.x,c.y,20,20);
}

ctx.fillStyle="purple";
for(let e of enemies){
if(!e.dead)
ctx.fillRect(e.x,e.y,e.w,e.h);
}

ctx.fillStyle="red";
ctx.fillRect(player.x,player.y,player.w,player.h);

ctx.fillStyle="green";
ctx.fillRect(goal.x,goal.y,goal.w,goal.h);

ctx.restore();

ctx.fillStyle="black";
ctx.fillText("Lives:"+lives+" Coins:"+coins,20,20);
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

loop();
</script>
</body>
</html>
