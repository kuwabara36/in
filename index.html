<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミニ横スクロールアクション</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#87ceeb;
}
canvas{
    display:block;
    background:linear-gradient(#87ceeb 70%, #3cb371 70%);
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 450;

let gravity = 0.8;

let player = {
    x:100,
    y:0,
    w:40,
    h:50,
    dx:0,
    dy:0,
    speed:5,
    jumpPower:-15,
    onGround:false
};

let cameraX = 0;

const keys = {};

const platforms = [
    {x:0,y:400,w:2000,h:50},
    {x:300,y:320,w:150,h:20},
    {x:550,y:280,w:150,h:20},
    {x:800,y:350,w:200,h:20},
    {x:1150,y:300,w:150,h:20}
];

const enemies = [
    {x:650,y:240,w:40,h:40,dir:1},
    {x:1200,y:260,w:40,h:40,dir:1}
];

const goal = {x:1700,y:350,w:40,h:50};

function rectCollision(a,b){
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

function update(){
    player.dx = 0;

    if(keys["ArrowRight"]) player.dx = player.speed;
    if(keys["ArrowLeft"]) player.dx = -player.speed;

    player.x += player.dx;

    player.dy += gravity;
    player.y += player.dy;

    player.onGround = false;

    for(let p of platforms){
        if(rectCollision(player,p)){
            if(player.dy > 0){
                player.y = p.y - player.h;
                player.dy = 0;
                player.onGround = true;
            }
        }
    }

    if(player.onGround && keys["Space"]){
        player.dy = player.jumpPower;
    }

    for(let e of enemies){
        e.x += 2 * e.dir;
        if(e.x < 500 || e.x > 1400) e.dir *= -1;

        if(rectCollision(player,e)){
            alert("ゲームオーバー");
            location.reload();
        }
    }

    if(rectCollision(player,goal)){
        alert("ゴール！クリア！");
        location.reload();
    }

    if(player.y > canvas.height){
        alert("落下！ゲームオーバー");
        location.reload();
    }

    cameraX = player.x - 200;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(-cameraX,0);

    ctx.fillStyle = "#654321";
    for(let p of platforms){
        ctx.fillRect(p.x,p.y,p.w,p.h);
    }

    ctx.fillStyle = "red";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    ctx.fillStyle = "purple";
    for(let e of enemies){
        ctx.fillRect(e.x,e.y,e.w,e.h);
    }

    ctx.fillStyle = "gold";
    ctx.fillRect(goal.x,goal.y,goal.w,goal.h);

    ctx.restore();
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown",e=>{
    keys[e.code] = true;
});

document.addEventListener("keyup",e=>{
    keys[e.code] = false;
});

player.y = 300;
gameLoop();
</script>
</body>
</html>
