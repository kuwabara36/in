<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>爆弾迷路サバイバル</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
}
h1{margin:10px;}
#info{margin:5px;}
#maze{
    display:grid;
    margin:10px auto;
    width:400px;
    height:400px;
}
.cell{
    border:1px solid #222;
}
.wall{ background:#222; }
.path{ background:#333; }
.player{ background:#00ffcc; }
.goal{ background:#ffcc00; }
.bomb{ background:#ff4444; }
</style>
</head>
<body>

<h1>💣 爆弾迷路サバイバル</h1>
<div id="info">Level: 1 | Time: 30 | Score: 0</div>
<div id="maze"></div>

<script>
const size = 15;
let maze = [];
let player = {x:1,y:1};
let goal = {x:size-2,y:size-2};
let level = 1;
let score = 0;
let timeLeft = 30;
let bombCount = 2;
let timer;

function generateMaze(){
    maze = Array(size).fill().map(()=>Array(size).fill(1));

    function carve(x,y){
        maze[y][x] = 0;
        const dirs = [[2,0],[-2,0],[0,2],[0,-2]].sort(()=>Math.random()-0.5);
        for(let [dx,dy] of dirs){
            let nx=x+dx, ny=y+dy;
            if(nx>0 && ny>0 && nx<size-1 && ny<size-1 && maze[ny][nx]===1){
                maze[y+dy/2][x+dx/2]=0;
                carve(nx,ny);
            }
        }
    }
    carve(1,1);
}

function drawMaze(){
    const mazeDiv=document.getElementById("maze");
    mazeDiv.style.gridTemplateColumns=`repeat(${size},1fr)`;
    mazeDiv.innerHTML="";
    for(let y=0;y<size;y++){
        for(let x=0;x<size;x++){
            const cell=document.createElement("div");
            cell.classList.add("cell");
            if(maze[y][x]===1) cell.classList.add("wall");
            else cell.classList.add("path");

            if(x===player.x && y===player.y)
                cell.classList.add("player");

            if(x===goal.x && y===goal.y)
                cell.classList.add("goal");

            mazeDiv.appendChild(cell);
        }
    }
}

function move(dx,dy){
    let nx=player.x+dx;
    let ny=player.y+dy;
    if(maze[ny][nx]===0){
        player.x=nx;
        player.y=ny;
        checkGoal();
        drawMaze();
    }
}

function checkGoal(){
    if(player.x===goal.x && player.y===goal.y){
        level++;
        score+=timeLeft*10;
        bombCount++;
        startLevel();
    }
}

function spawnBomb(){
    let bx,by;
    do{
        bx=Math.floor(Math.random()*size);
        by=Math.floor(Math.random()*size);
    }while(maze[by][bx]!==0 || (bx===player.x && by===player.y));

    const index=by*size+bx;
    document.getElementById("maze").children[index].classList.add("bomb");

    setTimeout(()=>{
        if(player.x===bx && player.y===by){
            alert("💥 爆発！ゲームオーバー\nScore: "+score);
            location.reload();
        }
        document.getElementById("maze").children[index].classList.remove("bomb");
    },1500);
}

function startLevel(){
    timeLeft=30;
    player={x:1,y:1};
    goal={x:size-2,y:size-2};
    generateMaze();
    drawMaze();

    clearInterval(timer);
    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("info").textContent=
            `Level: ${level} | Time: ${timeLeft} | Score: ${score}`;
        if(timeLeft<=0){
            alert("⏰ タイムアップ！\nScore: "+score);
            location.reload();
        }
    },1000);

    for(let i=0;i<bombCount;i++){
        setTimeout(()=>spawnBomb(),2000+i*1500);
    }
}

document.addEventListener("keydown",(e)=>{
    if(e.key==="ArrowUp") move(0,-1);
    if(e.key==="ArrowDown") move(0,1);
    if(e.key==="ArrowLeft") move(-1,0);
    if(e.key==="ArrowRight") move(1,0);
});

startLevel();
</script>

</body>
</html>
