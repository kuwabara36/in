<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Super HTML Bros</title>

<style>

body{
margin:0;
background:#5ec5ff;
overflow:hidden;
font-family:sans-serif;
}

#game{
width:1400px;
height:600px;
margin:auto;
border:4px solid black;
position:relative;
overflow:hidden;
background:linear-gradient(#5ec5ff,#c9f0ff);
}

#world{
position:absolute;
height:600px;
width:4000px;
}

.player{
width:40px;
height:50px;
background:red;
position:absolute;
border-radius:5px;
}

.platform{
height:20px;
background:#654321;
position:absolute;
}

.coin{
width:20px;
height:20px;
background:gold;
border-radius:50%;
position:absolute;
}

.enemy{
width:40px;
height:40px;
background:purple;
position:absolute;
border-radius:50%;
}

.spike{
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:40px solid black;
position:absolute;
}

.goal{
width:20px;
height:120px;
background:green;
position:absolute;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:20px;
color:black;
}

</style>
</head>

<body>

<div id="game">

<div id="ui">
Score: <span id="score">0</span>
</div>

<div id="world">

<div class="player" id="player"></div>

<div class="platform" style="left:0px;width:4000px;top:560px;"></div>
<div class="platform" style="left:300px;width:150px;top:450px;"></div>
<div class="platform" style="left:600px;width:150px;top:380px;"></div>
<div class="platform" style="left:1000px;width:200px;top:430px;"></div>
<div class="platform" style="left:1500px;width:200px;top:350px;"></div>
<div class="platform" style="left:2000px;width:150px;top:420px;"></div>
<div class="platform" style="left:2400px;width:200px;top:320px;"></div>
<div class="platform" style="left:2900px;width:200px;top:420px;"></div>

<div class="coin" style="left:320px;top:410px;"></div>
<div class="coin" style="left:640px;top:340px;"></div>
<div class="coin" style="left:1030px;top:390px;"></div>
<div class="coin" style="left:1550px;top:310px;"></div>
<div class="coin" style="left:2430px;top:280px;"></div>

<div class="enemy" style="left:800px;top:520px;"></div>
<div class="enemy" style="left:1800px;top:520px;"></div>
<div class="enemy" style="left:2600px;top:520px;"></div>

<div class="spike" style="left:1200px;top:520px;"></div>
<div class="spike" style="left:2200px;top:520px;"></div>

<div class="goal" style="left:3800px;top:440px;"></div>

</div>
</div>

<script>

const player=document.getElementById("player")
const world=document.getElementById("world")
const coins=document.querySelectorAll(".coin")
const enemies=document.querySelectorAll(".enemy")
const spikes=document.querySelectorAll(".spike")
const goal=document.querySelector(".goal")

let x=100
let y=0
let vx=0
let vy=0
let gravity=0.7
let jumpPower=-14
let onGround=false
let score=0

const keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function jumpSound(){

let ctx=new AudioContext()
let osc=ctx.createOscillator()
osc.frequency.value=500
osc.connect(ctx.destination)
osc.start()
osc.stop(ctx.currentTime+0.1)

}

function collide(a,b){

let ar=a.getBoundingClientRect()
let br=b.getBoundingClientRect()

return !(
ar.right<br.left||
ar.left>br.right||
ar.bottom<br.top||
ar.top>br.bottom
)

}

function gameLoop(){

if(keys["ArrowRight"])vx=6
else if(keys["ArrowLeft"])vx=-6
else vx=0

if(keys[" "]&&onGround){

vy=jumpPower
onGround=false
jumpSound()

}

vy+=gravity

x+=vx
y+=vy

player.style.left=x+"px"
player.style.top=y+"px"

onGround=false

document.querySelectorAll(".platform").forEach(p=>{

if(collide(player,p)&&vy>=0){

y=p.offsetTop-50
vy=0
onGround=true

}

})

coins.forEach(c=>{

if(c.style.display!="none" && collide(player,c)){

c.style.display="none"
score+=10
document.getElementById("score").innerText=score

}

})

enemies.forEach(e=>{

if(collide(player,e)){

if(vy>0){

e.remove()
vy=-10
score+=50

}else{

alert("GAME OVER")
location.reload()

}

}

})

spikes.forEach(s=>{

if(collide(player,s)){

alert("GAME OVER")
location.reload()

}

})

if(collide(player,goal)){

alert("CLEAR!! Score:"+score)
location.reload()

}

world.style.left=-(x-500)+"px"

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
