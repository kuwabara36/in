<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Random Adventure Platformer</title>

<style>

body{
margin:0;
background:#6cc6ff;
overflow:hidden;
font-family:sans-serif;
}

#game{
width:1600px;
height:700px;
margin:auto;
border:4px solid black;
overflow:hidden;
position:relative;
background:linear-gradient(#6cc6ff,#e6f7ff);
}

#world{
position:absolute;
height:700px;
width:12000px;
}

.player{
width:40px;
height:50px;
background:red;
position:absolute;
border-radius:6px;
}

.big{
transform:scale(1.5);
}

.platform{
position:absolute;
height:20px;
background:#654321;
}

.coin{
width:20px;
height:20px;
background:gold;
border-radius:50%;
position:absolute;
}

.enemy{
width:40px;
height:40px;
background:purple;
border-radius:50%;
position:absolute;
}

.spike{
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:40px solid black;
position:absolute;
}

.goal{
width:20px;
height:140px;
background:green;
position:absolute;
}

.item{
width:30px;
height:30px;
position:absolute;
border-radius:6px;
}

.star{background:yellow;}
.mushroom{background:orange;}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:22px;
}

</style>
</head>

<body>

<div id="game">

<div id="ui">
Score: <span id="score">0</span>
</div>

<div id="world">
<div id="player" class="player"></div>
</div>

</div>

<script>

const world=document.getElementById("world")
const player=document.getElementById("player")

let x=100
let y=0
let vx=0
let vy=0

let gravity=0.7
let jumpPower=-14
let jumps=0

let speed=6
let score=0
let invincible=false

const keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function collide(a,b){

let ar=a.getBoundingClientRect()
let br=b.getBoundingClientRect()

return !(ar.right<br.left||ar.left>br.right||ar.bottom<br.top||ar.top>br.bottom)

}

function create(type,left,top){

let el=document.createElement("div")
el.className=type
el.style.left=left+"px"
el.style.top=top+"px"
world.appendChild(el)
return el

}

function generateStage(){

create("platform",0,660).style.width="12000px"

for(let i=300;i<11500;i+=Math.random()*400+200){

let h=400+Math.random()*200

let p=create("platform",i,h)
p.style.width=150+Math.random()*150

if(Math.random()<0.6)
create("coin",i+50,h-40)

if(Math.random()<0.3)
create("enemy",i+60,620)

if(Math.random()<0.2)
create("spike",i+80,620)

if(Math.random()<0.15)
create("item mushroom",i+40,h-40)

if(Math.random()<0.1)
create("item star",i+40,h-40)

}

create("goal",11800,520)

}

generateStage()

function gameLoop(){

if(keys["ArrowRight"])vx=speed
else if(keys["ArrowLeft"])vx=-speed
else vx=0

if(keys["Shift"])speed=11
else speed=6

if(keys[" "] && jumps<2){

vy=jumpPower
jumps++

}

vy+=gravity

x+=vx
y+=vy

player.style.left=x+"px"
player.style.top=y+"px"

document.querySelectorAll(".platform").forEach(p=>{

if(collide(player,p) && vy>=0){

y=p.offsetTop-50
vy=0
jumps=0

}

})

document.querySelectorAll(".coin").forEach(c=>{

if(c.style.display!="none" && collide(player,c)){

c.style.display="none"
score+=10
scoreDisplay()

}

})

document.querySelectorAll(".enemy").forEach(e=>{

if(collide(player,e)){

if(vy>0){

e.remove()
vy=-10
score+=50
scoreDisplay()

}else if(!invincible){

gameOver()

}

}

})

document.querySelectorAll(".spike").forEach(s=>{

if(collide(player,s) && !invincible){

gameOver()

}

})

document.querySelectorAll(".mushroom").forEach(m=>{

if(collide(player,m)){

player.classList.add("big")
score+=100
scoreDisplay()
m.remove()

}

})

document.querySelectorAll(".star").forEach(s=>{

if(collide(player,s)){

invincible=true
player.style.background="yellow"

setTimeout(()=>{
invincible=false
player.style.background="red"
},5000)

s.remove()

}

})

let goal=document.querySelector(".goal")

if(collide(player,goal)){

alert("STAGE CLEAR! Score:"+score)
location.reload()

}

world.style.left=-(x-700)+"px"

requestAnimationFrame(gameLoop)

}

function scoreDisplay(){
document.getElementById("score").innerText=score
}

function gameOver(){

alert("GAME OVER Score:"+score)
location.reload()

}

gameLoop()

</script>

</body>
</html>
