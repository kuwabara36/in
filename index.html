<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>落ちる数字パズル</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
}
h1{margin:10px;}
#info{margin:5px;}
#board{
    margin:10px auto;
    display:grid;
    grid-template-columns: repeat(6, 60px);
    grid-template-rows: repeat(10, 60px);
    gap:4px;
    width:max-content;
}
.cell{
    width:60px;
    height:60px;
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    font-size:20px;
    border-radius:8px;
    transition:0.15s;
}
.merge{
    animation:pop 0.2s ease;
}
@keyframes pop{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}
</style>
</head>
<body>

<h1>🧩 落ちる数字パズル</h1>
<div id="info"></div>
<div id="board"></div>

<script>
const COLS=6;
const ROWS=10;
let board=[];
let current=null;
let dropInterval;
let score=0;
let combo=0;
let highScore=localStorage.getItem("highScore")||0;

function init(){
    board=Array(ROWS).fill().map(()=>Array(COLS).fill(0));
    score=0;
    combo=0;
    spawn();
    update();
    dropInterval=setInterval(drop,700);
}

function spawn(){
    const col=Math.floor(Math.random()*COLS);
    current={row:0,col:col,value:Math.random()<0.8?2:4};
    if(board[0][col]!==0){
        alert("ゲームオーバー\nScore:"+score);
        if(score>highScore){
            localStorage.setItem("highScore",score);
        }
        location.reload();
    }
}

function drop(){
    if(!current)return;
    if(current.row+1<ROWS && board[current.row+1][current.col]===0){
        current.row++;
    }else{
        board[current.row][current.col]=current.value;
        merge(current.row,current.col);
        spawn();
    }
    update();
}

function merge(r,c){
    let merged=true;
    combo=0;
    while(merged){
        merged=false;
        const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
        for(let d of dirs){
            let nr=r+d[0];
            let nc=c+d[1];
            if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS){
                if(board[nr][nc]===board[r][c]){
                    board[r][c]*=2;
                    board[nr][nc]=0;
                    score+=board[r][c];
                    combo++;
                    merged=true;
                }
            }
        }
    }
    if(combo>1) score+=combo*50;
    applyGravity();
}

function applyGravity(){
    let moved=true;
    while(moved){
        moved=false;
        for(let c=0;c<COLS;c++){
            for(let r=ROWS-1;r>0;r--){
                if(board[r][c]===0 && board[r-1][c]!==0){
                    board[r][c]=board[r-1][c];
                    board[r-1][c]=0;
                    moved=true;
                }
            }
        }
    }
}

function update(){
    const boardDiv=document.getElementById("board");
    boardDiv.innerHTML="";
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            const cell=document.createElement("div");
            cell.className="cell";
            let val=board[r][c];
            if(current && r===current.row && c===current.col){
                val=current.value;
            }
            if(val!==0){
                cell.textContent=val;
                cell.style.background=`hsl(${Math.log2(val)*35},70%,50%)`;
            }
            boardDiv.appendChild(cell);
        }
    }
    document.getElementById("info").textContent=
        `Score: ${score} | Combo: ${combo} | HighScore: ${highScore}`;
}

document.addEventListener("keydown",e=>{
    if(!current)return;
    if(e.key==="ArrowLeft" && current.col>0 && board[current.row][current.col-1]===0){
        current.col--;
    }
    if(e.key==="ArrowRight" && current.col<COLS-1 && board[current.row][current.col+1]===0){
        current.col++;
    }
    if(e.key==="ArrowDown"){
        drop();
    }
    update();
});

init();
</script>

</body>
</html>
