<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>アクションアドベンチャー</title>
<style>
body{
margin:0;
overflow:hidden;
background:#87ceeb;
font-family:sans-serif;
}
canvas{
display:block;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

let gravity=0.8
let cameraX=0

let lives=3
let score=0

const keys={}

let player={
x:100,
y:300,
w:40,
h:50,
dx:0,
dy:0,
speed:6,
jump:-16,
onGround:false
}

const worldWidth=5000

const platforms=[
{x:0,y:canvas.height-50,w:5000,h:50},

{x:300,y:450,w:150,h:20},
{x:550,y:380,w:150,h:20,type:"move",dir:1},
{x:800,y:330,w:150,h:20},

{x:1100,y:400,w:120,h:20,type:"fall"},
{x:1300,y:320,w:150,h:20},
{x:1600,y:260,w:150,h:20},

{x:2000,y:380,w:150,h:20,type:"move",dir:1},
{x:2300,y:300,w:150,h:20},
{x:2600,y:230,w:150,h:20},

{x:3000,y:350,w:150,h:20,type:"fall"},
{x:3300,y:280,w:150,h:20},
{x:3600,y:220,w:150,h:20},

{x:4000,y:320,w:200,h:20}
]

const enemies=[
{x:700,y:290,w:40,h:40,dir:1},
{x:1800,y:220,w:40,h:40,dir:1},
{x:3200,y:240,w:40,h:40,dir:1}
]

const lava=[
{x:1500,y:canvas.height-40,w:200,h:40},
{x:3500,y:canvas.height-40,w:200,h:40}
]

let coins=[]
for(let i=200;i<4500;i+=200){
coins.push({x:i,y:Math.random()*300+100,collected:false})
}

const goal={x:4700,y:canvas.height-100,w:50,h:80}

function die(){
lives--
player.x=100
player.y=300
player.dx=0
player.dy=0

if(lives<=0){
alert("ゲームオーバー\nScore:"+score)
location.reload()
}
}

function update(){

player.dx=0

if(keys["ArrowRight"]) player.dx=player.speed
if(keys["ArrowLeft"]) player.dx=-player.speed

player.x+=player.dx

player.dy+=gravity
player.y+=player.dy

player.onGround=false

for(let p of platforms){

if(p.type==="move"){
p.x+=2*p.dir
if(p.x>p.start+100||p.x<p.start-100) p.dir*=-1
}

if(
player.x<p.x+p.w &&
player.x+player.w>p.x &&
player.y+player.h>p.y &&
player.y+player.h<p.y+20 &&
player.dy>=0
){
player.y=p.y-player.h
player.dy=0
player.onGround=true

if(p.type==="fall"){
setTimeout(()=>{p.y+=600},500)
}
}
}

if(player.onGround && keys["Space"]){
player.dy=player.jump
}

for(let e of enemies){

e.x+=2*e.dir
if(e.x<e.start-100||e.x>e.start+100) e.dir*=-1

if(
player.x<e.x+e.w &&
player.x+player.w>e.x &&
player.y<e.y+e.h &&
player.y+player.h>e.y
){
if(player.dy>0){
e.dead=true
player.dy=-10
score+=50
}else{
die()
}
}
}

for(let l of lava){
if(
player.x<l.x+l.w &&
player.x+player.w>l.x &&
player.y+player.h>l.y
){
die()
}
}

for(let c of coins){
if(!c.collected &&
player.x<c.x+20 &&
player.x+player.w>c.x &&
player.y<c.y+20 &&
player.y+player.h>c.y){
c.collected=true
score+=10
}
}

if(
player.x<goal.x+goal.w &&
player.x+player.w>goal.x &&
player.y<goal.y+goal.h &&
player.y+player.h>goal.y
){
alert("クリア！ Score:"+score)
location.reload()
}

if(player.y>canvas.height) die()

cameraX=player.x-canvas.width/3
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.save()
ctx.translate(-cameraX,0)

ctx.fillStyle="#654321"
for(let p of platforms){
ctx.fillRect(p.x,p.y,p.w,p.h)
}

ctx.fillStyle="red"
for(let l of lava){
ctx.fillRect(l.x,l.y,l.w,l.h)
}

ctx.fillStyle="gold"
for(let c of coins){
if(!c.collected)
ctx.fillRect(c.x,c.y,20,20)
}

ctx.fillStyle="purple"
for(let e of enemies){
if(!e.dead)
ctx.fillRect(e.x,e.y,e.w,e.h)
}

ctx.fillStyle="blue"
ctx.fillRect(player.x,player.y,player.w,player.h)

ctx.fillStyle="green"
ctx.fillRect(goal.x,goal.y,goal.w,goal.h)

ctx.restore()

ctx.fillStyle="black"
ctx.font="20px sans-serif"
ctx.fillText("Lives:"+lives+"  Score:"+score,20,30)

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

document.addEventListener("keydown",e=>keys[e.code]=true)
document.addEventListener("keyup",e=>keys[e.code]=false)

for(let p of platforms) p.start=p.x
for(let e of enemies) e.start=e.x

loop()

</script>

</body>
</html>
