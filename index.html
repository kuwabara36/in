<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Platform Adventure</title>

<style>

body{
margin:0;
overflow:hidden;
background:#6cc6ff;
font-family:sans-serif;
}

#game{
width:1600px;
height:700px;
margin:auto;
border:4px solid black;
overflow:hidden;
position:relative;
background:linear-gradient(#6cc6ff,#e6f7ff);
}

#world{
position:absolute;
width:9000px;
height:700px;
}

.player{
width:40px;
height:50px;
background:red;
position:absolute;
border-radius:6px;
}

.platform{
position:absolute;
height:20px;
background:#654321;
}

.enemy{
width:35px;
height:35px;
background:purple;
border-radius:50%;
position:absolute;
}

.coin{
width:18px;
height:18px;
background:gold;
border-radius:50%;
position:absolute;
}

.spring{
width:40px;
height:20px;
background:cyan;
position:absolute;
}

.door{
width:70px;
height:100px;
background:brown;
color:white;
font-size:14px;
text-align:center;
line-height:100px;
position:absolute;
}

.checkpoint{
width:20px;
height:80px;
background:blue;
position:absolute;
}

.ceiling{
position:absolute;
height:20px;
background:#555;
}

</style>
</head>

<body>

<div id="game">

<div id="world">
<div id="player" class="player"></div>
</div>

</div>

<script>

const world=document.getElementById("world")
const player=document.getElementById("player")

let x=100
let y=500

let vx=0
let vy=0

let speed=6
let gravity=0.7
let jumpPower=-14

let onGround=false

let respawnX=100
let respawnY=500

const keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function collide(a,b){

let ar=a.getBoundingClientRect()
let br=b.getBoundingClientRect()

return !(ar.right<br.left||ar.left>br.right||ar.bottom<br.top||ar.top>br.bottom)

}

function create(type,x,y,w){

let el=document.createElement("div")
el.className=type
el.style.left=x+"px"
el.style.top=y+"px"

if(w)el.style.width=w+"px"

world.appendChild(el)

return el

}

function stage(){

create("platform",0,660,9000)

for(let i=400;i<8500;i+=600){

let h=400+Math.random()*150

create("platform",i,h,200)

create("enemy",i+80,h-35)

create("coin",i+100,h-40)

}

create("spring",1200,640)
create("spring",4200,640)

let d=create("door",2500,560)
d.innerText="DOOR"

let d2=create("door",7000,560)
d2.innerText="DOOR"

create("checkpoint",1500,580)
create("checkpoint",5000,580)

create("ceiling",3000,350,300)

}

stage()

function gameLoop(){

if(keys["ArrowRight"])vx=speed
else if(keys["ArrowLeft"])vx=-speed
else vx=0

if(keys[" "] && onGround){

vy=jumpPower
onGround=false

}

vy+=gravity

x+=vx
y+=vy

player.style.left=x+"px"
player.style.top=y+"px"

onGround=false

document.querySelectorAll(".platform").forEach(p=>{

if(collide(player,p) && vy>=0){

y=p.offsetTop-50
vy=0
onGround=true

}

})

document.querySelectorAll(".ceiling").forEach(c=>{

if(collide(player,c) && vy<0){

vy=0
y=c.offsetTop+20

}

})

document.querySelectorAll(".enemy").forEach(e=>{

let ex=parseFloat(e.style.left)

if(Math.abs(ex-x)<300){

if(ex<x)ex+=1.5
else ex-=1.5

e.style.left=ex+"px"

}

if(collide(player,e)){

respawn()

}

})

document.querySelectorAll(".spring").forEach(s=>{

if(collide(player,s) && vy>=0){

vy=-20

}

})

document.querySelectorAll(".door").forEach(d=>{

if(collide(player,d)){

x+=1500
y=500

}

})

document.querySelectorAll(".checkpoint").forEach(c=>{

if(collide(player,c)){

respawnX=c.offsetLeft
respawnY=500
c.style.background="lime"

}

})

if(y>720){

respawn()

}

world.style.left=-(x-700)+"px"

requestAnimationFrame(gameLoop)

}

function respawn(){

x=respawnX
y=respawnY
vx=0
vy=0

}

gameLoop()

</script>

</body>
</html>
