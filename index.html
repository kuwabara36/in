<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML Platform Adventure</title>

<style>

body{
margin:0;
overflow:hidden;
background:#6cc6ff;
font-family:sans-serif;
}

#game{
width:1600px;
height:700px;
margin:auto;
border:4px solid black;
overflow:hidden;
position:relative;
background:linear-gradient(#6cc6ff,#e6f7ff);
}

#world{
position:absolute;
width:12000px;
height:700px;
}

.player{
width:40px;
height:50px;
background:red;
position:absolute;
border-radius:6px;
}

.platform{
position:absolute;
height:20px;
background:#654321;
}

.enemy{
width:40px;
height:40px;
background:purple;
border-radius:50%;
position:absolute;
}

.coin{
width:20px;
height:20px;
background:gold;
border-radius:50%;
position:absolute;
}

.spike{
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:40px solid black;
position:absolute;
}

.door{
width:50px;
height:80px;
background:brown;
position:absolute;
}

.checkpoint{
width:20px;
height:80px;
background:blue;
position:absolute;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:22px;
}

</style>
</head>

<body>

<div id="game">

<div id="ui">
Score: <span id="score">0</span>
</div>

<div id="world">
<div id="player" class="player"></div>
</div>

</div>

<script>

const world=document.getElementById("world")
const player=document.getElementById("player")

let x=100
let y=0
let vx=0
let vy=0

let respawnX=100
let respawnY=0

let gravity=0.7
let jumpPower=-14
let jumps=0

let speed=6
let score=0

const keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function collide(a,b){

let ar=a.getBoundingClientRect()
let br=b.getBoundingClientRect()

return !(ar.right<br.left||ar.left>br.right||ar.bottom<br.top||ar.top>br.bottom)

}

function create(type,left,top,width){

let el=document.createElement("div")
el.className=type
el.style.left=left+"px"
el.style.top=top+"px"

if(width)el.style.width=width+"px"

world.appendChild(el)

return el

}

function generateStage(){

create("platform",0,660,12000)

for(let i=400;i<11500;i+=400){

let h=400+Math.random()*200

create("platform",i,h,150)

if(Math.random()<0.4)
create("coin",i+60,h-40)

if(Math.random()<0.3)
create("enemy",i+60,620)

if(Math.random()<0.2)
create("spike",i+60,620)

}

create("door",2500,580)
create("door",7000,580)

create("checkpoint",1500,580)
create("checkpoint",5000,580)

}

generateStage()

function gameLoop(){

if(keys["ArrowRight"])vx=speed
else if(keys["ArrowLeft"])vx=-speed
else vx=0

if(keys[" "] && jumps<2){

vy=jumpPower
jumps++

}

vy+=gravity

x+=vx
y+=vy

player.style.left=x+"px"
player.style.top=y+"px"

document.querySelectorAll(".platform").forEach(p=>{

if(collide(player,p) && vy>=0){

y=p.offsetTop-50
vy=0
jumps=0

}

})

document.querySelectorAll(".coin").forEach(c=>{

if(c.style.display!="none" && collide(player,c)){

c.style.display="none"
score+=10
updateScore()

}

})

document.querySelectorAll(".enemy").forEach(e=>{

let ex=parseFloat(e.style.left)

if(Math.abs(ex-x)<300){

if(ex<x) ex+=2
else ex-=2

e.style.left=ex+"px"

}

if(collide(player,e)){

if(vy>0){

e.remove()
vy=-10
score+=50
updateScore()

}else{

respawn()

}

}

})

document.querySelectorAll(".spike").forEach(s=>{

if(collide(player,s)){

respawn()

}

})

document.querySelectorAll(".door").forEach(d=>{

if(collide(player,d)){

x+=2000
y=0

}

})

document.querySelectorAll(".checkpoint").forEach(c=>{

if(collide(player,c)){

respawnX=c.offsetLeft
respawnY=0

c.style.background="lime"

}

})

if(y>720){

respawn()

}

world.style.left=-(x-700)+"px"

requestAnimationFrame(gameLoop)

}

function respawn(){

x=respawnX
y=respawnY
vx=0
vy=0

}

function updateScore(){
document.getElementById("score").innerText=score
}

gameLoop()

</script>

</body>
</html>
